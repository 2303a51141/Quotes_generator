<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - Quotes Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="auth-container">
    <div class="auth-card">
      <h1>Sign Up</h1>
      <p class="subtitle">Create your free account to save favorite quotes.</p>

      <form id="signupForm" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="yourname" required />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 6 characters" required />
        </div>

        <p id="errorMsg" class="error-msg"></p>

        <button type="submit" class="btn primary full-width">Create Account</button>
      </form>

      <p class="auth-link">
        Already have an account? <a href="login.html">Login</a>
      </p>
    </div>
  </main>

  <script src="auth.js"></script>
  <script>
    // Handle signup form submission
    document.getElementById("signupForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorMsg = document.getElementById("errorMsg");

      // Basic validation
      if (!username || !email || !password) {
        errorMsg.textContent = "Please fill in all fields.";
        return;
      }
      if (username.length < 2) {
        errorMsg.textContent = "Username must be at least 2 characters.";
        return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        errorMsg.textContent = "Please enter a valid email address.";
        return;
      }
      if (password.length < 6) {
        errorMsg.textContent = "Password must be at least 6 characters.";
        return;
      }

      // Try to register (auth.js)
      const result = registerUser(username, email, password);
      if (result.success) {
        window.location.href = "index.html";
      } else {
        errorMsg.textContent = result.message;
      }
    });
  </script>
</body>
</html>
